services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nj-house-app
    ports:
      - "8080:8080"
    environment:
      APP_DATA_FILE: /app/data/nanjing_prices.json
    volumes:
      - ./data:/app/data

  crawler:
    image: python:3.11-slim
    container_name: nj-house-crawler
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: >
      bash -c "pip install -r requirements.txt &&
      python3 python/crawler_nanjing_prices.py --max-pages 3 --output data/nanjing_prices.json"
    profiles: ["crawler"]
